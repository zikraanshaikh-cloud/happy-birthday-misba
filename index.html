<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Misba ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4e8a,#ff9a9e,#fad0c4);
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.2);
max-width:350px;
animation:pop 1s ease;
}

h1{
color:#ff2e63;
font-size:34px;
}

h2{
margin:10px 0;
color:#444;
}

p{
margin-top:15px;
font-size:18px;
line-height:1.6;
color:#555;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e91e63;
}

#msg{
margin-top:20px;
font-size:20px;
color:#ff2e63;
font-weight:bold;
display:none;
}

@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}
</style>

</head>

<body>

<div class="card">
<h1>🎂 Happy Birthday 🎂</h1>
<h2>My Dear Misba ❤️</h2>

<p>
May your smile always shine brighter than the stars.
May Allah bless you with happiness, success, good health and endless love.
You deserve every beautiful thing in this world. 💖
</p>

<button onclick="showMessage()">Click Here 🎁</button>

<div id="msg">
❤️ You are Special ❤️<br><br>
Have the most amazing birthday! 🎉🎂💐
</div>

</div>

<script>
function showMessage(){
document.getElementById("msg").style.display="block";
}
</script>

</body>
  </html>
